services:
  - type: web
    name: tengacion
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix backend --omit=dev --no-audit --no-fund && npm install --prefix frontend --include=dev --no-save --no-audit --no-fund && npm run build --prefix frontend
    startCommand: node backend/server.js
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://tengacion.com
      - key: CLIENT_URL
        value: https://tengacion.com
      - key: CORS_ORIGIN
        value: https://tengacion.com,https://www.tengacion.com,http://localhost:5173
      - key: PAYSTACK_CALLBACK_URL
        value: https://tengacion.com/payment/verify
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_REQUIRE_LIVE_KEY
        value: "true"
      - key: PLATFORM_SETTLEMENT_ACCOUNT_NAME
        value: Stephen Mamman Kurah
      - key: PLATFORM_SETTLEMENT_BANK_NAME
        value: Opay
      - key: PLATFORM_SETTLEMENT_ACCOUNT_NUMBER
        value: "8061201090"
      - key: CONTACT_EMAIL
        value: stephen@tengacion.com
      - key: SUPPORT_EMAIL
        value: stephen@tengacion.com
      - key: ADMIN_NOTIFICATION_EMAIL
        value: stephen@tengacion.com
      - key: EMAIL_FROM
        value: stephen@tengacion.com
      - key: EMAIL_LOGO_URL
        value: https://tengacion.com/tengacion_logo_512.png
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: VITE_API_URL
        value: /api
      - key: VITE_CONTACT_EMAIL
        value: stephen@tengacion.com
      - key: VITE_SUPPORT_EMAIL
        value: stephen@tengacion.com
      - key: VITE_ADMIN_NOTIFICATION_EMAIL
        value: stephen@tengacion.com
