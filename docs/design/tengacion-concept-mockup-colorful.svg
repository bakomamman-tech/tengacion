    <text x="1292" y="565" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="white">Exactly.</text>

    <rect x="1256" y="636" width="282" height="42" rx="12" fill="#F5E7D4" stroke="#D4B48B"/>
    <text x="1274" y="663" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#5C7FA7">Aa</text>
