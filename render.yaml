services:
  - type: web
    name: tengacion
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix backend --omit=dev --no-audit --no-fund && npm install --prefix frontend --include=dev --no-save --no-audit --no-fund && npm run build --prefix frontend
    startCommand: node backend/server.js
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

